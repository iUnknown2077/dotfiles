# Execs
exec-once = cachy-update --tray
exec-once = pika-backup-monitor

# General
input {
  kb_layout = pl
  kb_options = compose:caps
  numlock_by_default = true
  repeat_delay = 250
  repeat_rate = 35

  follow_mouse = 1
  off_window_axis_events = 2
  accel_profile = flat

  touchpad {
    natural_scroll = yes
    disable_while_typing = true
    clickfinger_behavior = true
    scroll_factor = 0.7
  }
}

# Keybinds
bindd = Super, Z, Toggle media mode, global, quickshell:mediaModeToggle
unbind = Super, C
bind = Super, C, exec, zeditor # Code editor
unbind = Super, X
bind = Super, X, exec, obsidian # Text editor
unbind = Ctrl+Shift, Escape
bind = Ctrl+Shift, Escape, exec, kitty -1 fish -c btop # Task manager

# Scrolling
source = /home/wiktor/dotfiles/end4-overrides/hyprland/scrolling.conf
