input {
  kb_layout = pl
  kb_options = compose:caps
  numlock_by_default = true
  repeat_delay = 250
  repeat_rate = 35

  follow_mouse = 1
  off_window_axis_events = 2
  accel_profile = flat

  touchpad {
    natural_scroll = yes
    disable_while_typing = true
    clickfinger_behavior = true
    scroll_factor = 0.7
  }
}

exec-once = cachy-update --tray
