# Config
scrolling {
  fullscreen_on_one_column = true
  column_width = 0.5
  explicit_column_widths = 0.333, 0.5, 0.667, 1.0
  }

# Dispatchers
unbind = Super, Period
bind = Super, comma,  layoutmsg, focus left
bind = Super, period, layoutmsg, focus right
bind = Super, Semicolon, layoutmsg, colresize -conf
bind = Super, Apostrophe, layoutmsg, colresize +conf
bind = Super+Shift, comma, layoutmsg, swapcol l
bind = Super+Shift, period, layoutmsg, swapcol r
