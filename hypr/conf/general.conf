# Themes
source=~/.config/hypr/themes/dracula.conf

# Look & Feel
general {
 gaps_in = 4
 gaps_out = 8

 border_size = 1

 col.active_border =  rgba($bgAlphaEE)
 col.inactive_border = rgba($bgAlphaEE)

 resize_on_border = false

 allow_tearing = false

 layout = dwindle
}

decoration {
 rounding = 10

 active_opacity = 1.0
 inactive_opacity = 1.0
 fullscreen_opacity = 1.0

shadow {
 enabled = true
 range = 4
 render_power = 3
 color = rgba(1e202966)
}

blur {
 enabled = true
 size = 3
 passes = 1
 new_optimizations = true
 ignore_opacity = true
 xray = true
 }
}

animations {
 enabled = true

 bezier = overshot, 0.15, 1, 0.30, 1.1

 animation = windows, 1, 4, overshot, slide
 animation = windowsOut, 1, 5, default, popin 80%
 animation = border, 1, 5, default
 animation = borderangle, 1, 100, default, loop
 animation = fade, 1, 8, default
 animation = workspaces, 1, 6, overshot, slidefade 20%
 animation = specialWorkspace, 1, 6, overshot, slidefadevert 20%
}

dwindle {
 pseudotile = true
 preserve_split = true
}

master {
 new_status = master
}

misc {
 force_default_wallpaper = 0
 disable_hyprland_logo = true
 disable_splash_rendering = true
}

gestures {
 workspace_swipe = false
}
