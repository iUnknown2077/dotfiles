# Theme
include dracula.conf

# Opacity
background_opacity 0.75

# Fonts
font_family Hack Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14

# Tab bar
tab_bar_edge bottom
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style powerline
tab_bar_align left

# Padding
window_padding_width 5
