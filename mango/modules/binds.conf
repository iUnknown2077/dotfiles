### Binds ###
## Basic window management
bind=SUPER,Return,spawn,alacritty
bind=SUPER,d,spawn,rofi -show drun
bind=SUPER,s,spawn,/home/wiktor/.config/mango/scripts/screenshot.sh
bind=SUPER,q,killclient,

## Toggle overview mode
bind=SUPER,tab,toggleoverview

## Window state toggles
bind=SUPER+SHIFT,f,togglefullscreen
bind=SUPER+SHIFT,space,togglefloating

## Layout management
bind=SUPER,c,setlayout,tile
bind=SUPER,n,switch_layout

## Master area controls (tiling layout)
# Decrease/Increase master area width
bind=SUPER,h,setmfact,-0.05
bind=SUPER,l,setmfact,+0.05
# Increment/Decrement number of master windows
bind=SUPER,i,incnmaster,1
bind=SUPER,p,incnmaster,-1

## Gaps toggle
bind=SUPER,a,togglegaps

## Window manager controls
bind=SUPER+SHIFT,q,quit
bind=SUPER+SHIFTT,r,reload_config

## Focus movement [1 for up in the stack, -1 for down]
bind=SUPER,j,focusstack,next
bind=SUPER,k,focusstack,prev

## Window movement (swap position in stack)
bind=SUPER+SHIFT,j,exchange_stack_client,next
bind=SUPER+SHIFT,k,exchange_stack_client,prev

## Multi-monitor support
# Focus next/previous Monitors
bind=SUPER,comma,focusmon,left
bind=SUPER,period,focusmon,right
# Move window to next/previous Monitors
bind=SHIFT+SUPER,comma,tagmon,left
bind=SHIFT+SUPER,period,tagmon,right

## Workspace (tag) navigation
bind=SUPER,1,view,1
bind=SUPER,2,view,2
bind=SUPER,3,view,3
bind=SUPER,4,view,4
bind=SUPER,5,view,5
bind=SUPER,6,view,6
bind=SUPER,7,view,7
bind=SUPER,8,view,8
bind=SUPER,9,view,9

## Move focused window to workspace N
bind=SUPER+SHIFT,1,tag,1
bind=SUPER+SHIFT,2,tag,2
bind=SUPER+SHIFT,3,tag,3
bind=SUPER+SHIFT,4,tag,4
bind=SUPER+SHIFT,5,tag,5
bind=SUPER+SHIFT,6,tag,6
bind=SUPER+SHIFT,7,tag,7
bind=SUPER+SHIFT,8,tag,8
bind=SUPER+SHIFT,9,tag,9

## Combo view (view multiple tags at once) {argos_nothing}
bind=ctrl+SUPER,1,toggleview,1
bind=ctrl+SUPER,2,toggleview,2
bind=ctrl+SUPER,3,toggleview,3
bind=ctrl+SUPER,4,toggleview,4
bind=ctrl+SUPER,5,toggleview,5
bind=ctrl+SUPER,6,toggleview,6
bind=ctrl+SUPER,7,toggleview,7
bind=ctrl+SUPER,8,toggleview,8
bind=ctrl+SUPER,9,toggleview,9

## Multi tag (window on multiple tags)
bind=ctrl+SUPER+SHIFT,1,toggletag,1
bind=ctrl+SUPER+SHIFT,2,toggletag,2
bind=ctrl+SUPER+SHIFT,3,toggletag,3
bind=ctrl+SUPER+SHIFT,4,toggletag,4
bind=ctrl+SUPER+SHIFT,5,toggletag,5
bind=ctrl+SUPER+SHIFT,6,toggletag,6
bind=ctrl+SUPER+SHIFT,7,toggletag,7
bind=ctrl+SUPER+SHIFT,8,toggletag,8
bind=ctrl+SUPER+SHIFT,9,toggletag,9

# Window manipulation
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
